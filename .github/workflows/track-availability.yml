name: Track Machu Picchu Availability

on:
  schedule:
    # Every 10 minutes, 5 AM - 6 PM Peru time (UTC-5 = 10-23 UTC)
    - cron: '*/10 10-23 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch availability data
        env:
          TUBOLETO_SECRET_KEY: ${{ secrets.TUBOLETO_SECRET_KEY }}
        run: node scripts/fetch-availability.js

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: availability $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase
            git push
          fi
